<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Video Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-overflow-scrolling: auto;
            touch-action: manipulation;
        }

        .glow-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: glowMove 18s ease-in-out infinite alternate;
            will-change: transform;
        }

        .glow-1 {
            background: radial-gradient(circle, #ff00ff, transparent 70%);
            top: -300px;
            left: -200px;
        }

        .glow-2 {
            background: radial-gradient(circle, #00ffff, transparent 70%);
            bottom: -300px;
            right: -200px;
            animation-delay: -9s;
        }

        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(120px, 100px) scale(1.3); }
        }

        .sidebar {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            z-index: 5;
        }

        .sidebar.left { left: 0; }
        .sidebar.right { right: 0; }

        .side-emoji {
            font-size: 42px;
            animation: bounce 2.2s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.15); }
        }

        .video-wrap {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 82vw;
            max-height: 72vh;
            z-index: 10;
        }

        video {
            width: 100%;
            height: auto;
            max-height: 72vh;
            border-radius: 14px;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.2);
            outline: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* 弹幕样式 */
        .danmaku-container {
            position: fixed;
            inset: 0;
            z-index: 15;
            pointer-events: none;
            overflow: hidden;
        }

        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            font-size: 20px;
            color: #ffffff;
            text-shadow: 0 0 4px #00ffff, 0 0 8px rgba(0, 255, 255, 0.5);
            font-weight: 500;
            will-change: transform;
            animation: danmakuMove linear forwards;
        }

        @keyframes danmakuMove {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        .danmaku-input-wrap {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            width: min(500px, 80vw);
        }

        .danmaku-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 999px;
            color: #00ffff;
            font-size: 15px;
            outline: none;
            backdrop-filter: blur(6px);
        }

        .danmaku-input::placeholder { color: rgba(0, 255, 255, 0.5); }

        .danmaku-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .danmaku-send {
            padding: 0 24px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            border-radius: 999px;
            color: #00ffff;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .danmaku-send:hover:not(:disabled) {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .danmaku-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .side-emoji { font-size: 30px; }
            .video-wrap { max-width: 75vw; max-height: 65vh; }
            video { max-height: 65vh; }
            .danmaku-item { font-size: 16px; }
            .danmaku-input-wrap { bottom: 20px; width: 85vw; }
            .danmaku-input { padding: 10px 14px; font-size: 14px; }
            .danmaku-send { padding: 0 18px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="glow-bg">
        <div class="glow glow-1" id="glow1"></div>
        <div class="glow glow-2" id="glow2"></div>
    </div>

    <div class="sidebar left" id="leftBar"></div>
    <div class="sidebar right" id="rightBar"></div>

    <div class="danmaku-container" id="danmakuContainer"></div>

    <div class="video-wrap">
        <video src="video.mp4" controls preload="metadata"></video>
    </div>

    <div class="danmaku-input-wrap">
        <input type="text" class="danmaku-input" id="danmakuInput" maxlength="15" placeholder="发个弹幕（最多15字）">
        <button class="danmaku-send" id="danmakuSend">发送</button>
    </div>

    <script>
        // 两侧表情栏
        const sideEmojis = ['✨','💫','🌟','⚡','🔮','💎','🎆','👾','🌀'];
        const leftBar = document.getElementById('leftBar');
        const rightBar = document.getElementById('rightBar');
        const allSideEmojis = [];

        function fillBar(container, reverse = false) {
            const list = reverse ? [...sideEmojis].reverse() : sideEmojis;
            list.forEach((emoji, index) => {
                const item = document.createElement('div');
                item.className = 'side-emoji';
                item.textContent = emoji;
                item.style.animationDelay = `${index * 0.2}s`;
                container.appendChild(item);
                allSideEmojis.push(item);
            });
        }
        fillBar(leftBar);
        fillBar(rightBar, true);

        // 全局鼠标波动
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        const waveRadius = 300;
        const waveAmplitude = 15;
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');

        function updateMouse(x, y) {
            mouseX = x;
            mouseY = y;
        }

        document.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
        document.addEventListener('touchmove', e => {
            if (e.touches.length > 0) updateMouse(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        function animateWave() {
            allSideEmojis.forEach(el => {
                const rect = el.getBoundingClientRect();
                const elCenterX = rect.left + rect.width / 2;
                const elCenterY = rect.top + rect.height / 2;
                const dx = elCenterX - mouseX;
                const dy = elCenterY - mouseY;
                const distance = Math.hypot(dx, dy);

                if (distance < waveRadius) {
                    const ratio = 1 - distance / waveRadius;
                    const wave = Math.sin(ratio * Math.PI) * waveAmplitude * ratio;
                    const offsetX = (dx / distance) * wave || 0;
                    const offsetY = (dy / distance) * wave || 0;
                    el.style.marginLeft = `${offsetX}px`;
                    el.style.marginTop = `${offsetY}px`;
                } else {
                    el.style.marginLeft = '';
                    el.style.marginTop = '';
                }
            });

            const glowOffsetX = (mouseX - window.innerWidth / 2) * 0.03;
            const glowOffsetY = (mouseY - window.innerHeight / 2) * 0.03;
            glow1.style.transform = `translate(${glowOffsetX}px, ${glowOffsetY}px)`;
            glow2.style.transform = `translate(${-glowOffsetX}px, ${-glowOffsetY}px)`;

            requestAnimationFrame(animateWave);
        }
        animateWave();

        // ========== D1 弹幕核心逻辑 ==========
        const danmakuContainer = document.getElementById('danmakuContainer');
        const danmakuInput = document.getElementById('danmakuInput');
        const danmakuSend = document.getElementById('danmakuSend');

        let lastCreatedTime = '';
        const DANMAKU_TRACKS = 8;
        const trackOccupied = new Array(DANMAKU_TRACKS).fill(0);

        // 创建单条弹幕 + 轨道防重叠
        function createDanmaku(text) {
            const item = document.createElement('div');
            item.className = 'danmaku-item';
            item.textContent = text;

            const trackHeight = (window.innerHeight * 0.7) / DANMAKU_TRACKS;
            let trackIndex = 0;
            let minTime = Infinity;
            for (let i = 0; i < DANMAKU_TRACKS; i++) {
                if (trackOccupied[i] < Date.now()) {
                    trackIndex = i;
                    break;
                }
                if (trackOccupied[i] < minTime) {
                    minTime = trackOccupied[i];
                    trackIndex = i;
                }
            }

            const top = window.innerHeight * 0.1 + trackIndex * trackHeight;
            item.style.top = `${top}px`;

            const duration = Math.random() * 4 + 8;
            item.style.animationDuration = `${duration}s`;
            trackOccupied[trackIndex] = Date.now() + duration * 1000 * 0.3;

            danmakuContainer.appendChild(item);
            item.addEventListener('animationend', () => item.remove());
        }

        // 拉取最新弹幕
        async function fetchNewDanmaku() {
            try {
                const url = lastCreatedTime 
                    ? `/api/danmaku?since=${encodeURIComponent(lastCreatedTime)}`
                    : '/api/danmaku';
                const res = await fetch(url, { cache: 'no-store' });
                const list = await res.json();

                if (list.length > 0) {
                    lastCreatedTime = list[0].created_at;
                    list.reverse().forEach(item => createDanmaku(item.content));
                }
            } catch (err) {
                console.error('拉取弹幕失败:', err);
            }
        }

        // 提交弹幕
        async function submitDanmaku() {
            const content = danmakuInput.value.trim();
            if (!content) return;
            if (content.length > 15) {
                alert('弹幕不能超过15个字');
                return;
            }

            danmakuSend.disabled = true;
            try {
                await fetch('/api/danmaku', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                createDanmaku(content);
                danmakuInput.value = '';
            } catch (err) {
                console.error('发送失败:', err);
                alert('发送失败，请稍后再试');
            } finally {
                danmakuSend.disabled = false;
            }
        }

        // 绑定发送事件
        danmakuSend.addEventListener('click', submitDanmaku);
        danmakuInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitDanmaku();
        });

        // 初始化 + 5秒轮询
        fetchNewDanmaku();
        setInterval(fetchNewDanmaku, 5000);

        // 页面切回时立刻拉取
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) fetchNewDanmaku();
        });
    </script>
</body>
</html>
