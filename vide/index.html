<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Emoji Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-overflow-scrolling: auto;
            touch-action: manipulation;
        }

        /* emoji 背景场 */
        .emoji-field {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .emoji-item {
            position: absolute;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            opacity: 0.8;
            will-change: transform;
            transition: transform 0.12s ease-out;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(8deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* 点击波纹效果 */
        .ripple {
            position: fixed;
            width: 120px;
            height: 120px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0.9;
            pointer-events: none;
            animation: ripple-expand 1s ease-out forwards;
            z-index: 9999;
        }

        @keyframes ripple-expand {
            to { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }

        /* 中央按钮区 */
        .center-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 10;
        }

        .enter-btn {
            padding: 22px 70px;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            border-radius: 999px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3),
                        inset 0 0 25px rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .enter-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5),
                        inset 0 0 30px rgba(0, 255, 255, 0.1);
            transform: scale(1.05);
        }
        .enter-btn:active { transform: scale(0.98); }

        /* 抽屉触发按钮 */
        .drawer-btn {
            padding: 14px 50px;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            border-radius: 999px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2),
                        inset 0 0 20px rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .drawer-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4),
                        inset 0 0 25px rgba(0, 255, 255, 0.1);
            transform: scale(1.05);
        }
        .drawer-btn:active { transform: scale(0.98); }

        /* 抽屉面板 */
        .drawer {
            position: fixed;
            left: 50%;
            bottom: -220px;
            transform: translateX(-50%);
            width: 320px;
            padding: 24px;
            background: rgba(10, 10, 26, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            z-index: 20;
            transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .drawer.active {
            bottom: 12%;
        }

        .drawer-option {
            padding: 16px;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .drawer-option:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            border-color: #00ffff;
        }

        /* 雪花碎片 */
        .fragment {
            position: fixed;
            pointer-events: none;
            background: #00ffff;
            border-radius: 2px;
            opacity: 0.9;
            z-index: 99999;
            will-change: transform, opacity;
        }

        @keyframes fragmentFall {
            0% {
                opacity: 0.9;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.3);
            }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .enter-btn {
                padding: 16px 40px;
                font-size: 16px;
            }
            .drawer-btn {
                padding: 12px 36px;
                font-size: 15px;
            }
            .drawer {
                width: 80vw;
                padding: 18px;
            }
            .drawer-option {
                padding: 14px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <div class="emoji-field" id="emojiField"></div>
    
    <div class="center-wrap">
        <button class="enter-btn" id="enterBtn">ENTER</button>
        <button class="drawer-btn" id="drawerBtn">CHOOSE</button>
    </div>

    <!-- 抽屉选项面板 -->
    <div class="drawer" id="drawer">
        <div class="drawer-option" data-value="freedom">freedom</div>
        <div class="drawer-option" data-value="life">life</div>
    </div>

    <script>
        // ========== 原有 emoji 生成 ==========
        const emojiList = ['✨','🚀','💫','🌟','⚡','🌈','🎮','🎧','💻','🌌','🔮','💎','🎆','👾','🛸','🌀','💥','🎇'];
        const emojiCount = 70;
        const field = document.getElementById('emojiField');
        const emojiElements = [];

        for (let i = 0; i < emojiCount; i++) {
            const item = document.createElement('div');
            item.className = 'emoji-item';
            item.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
            const left = Math.random() * 90 + 5;
            const top = Math.random() * 85 + 5;
            const size = Math.random() * 30 + 20;
            const delay = Math.random() * 6;
            const duration = Math.random() * 4 + 5;

            item.style.left = `${left}%`;
            item.style.top = `${top}%`;
            item.style.fontSize = `${size}px`;
            item.style.animationDelay = `${delay}s`;
            item.style.animationDuration = `${duration}s`;
            field.appendChild(item);
            emojiElements.push(item);
        }

        // ========== 原有全局鼠标波动 ==========
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let lastMouseMove = Date.now();
        let animId = null;
        const waveRadius = 250;
        const waveAmplitude = 18;

        function updateMouse(x, y) {
            mouseX = x;
            mouseY = y;
            lastMouseMove = Date.now();
        }

        document.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
        document.addEventListener('touchmove', e => {
            if (e.touches[0]) updateMouse(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) animateWave();
        });

        function animateWave() {
            const now = Date.now();
            const mouseIdle = now - lastMouseMove > 1200;

            emojiElements.forEach(el => {
                const rect = el.getBoundingClientRect();
                const elCX = rect.left + rect.width / 2;
                const elCY = rect.top + rect.height / 2;
                const dx = elCX - mouseX;
                const dy = elCY - mouseY;
                const dist = Math.hypot(dx, dy);

                if (mouseIdle || dist >= waveRadius) {
                    el.style.transform = '';
                    return;
                }

                const ratio = 1 - dist / waveRadius;
                const wave = Math.sin(ratio * Math.PI) * waveAmplitude * ratio;
                const offX = (dx / dist) * wave;
                const offY = (dy / dist) * wave;
                el.style.transform = `translate(${offX}px, ${offY}px)`;
            });

            animId = requestAnimationFrame(animateWave);
        }
        animateWave();

        // ========== 原有全局点击波纹 ==========
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            ripple.onanimationend = () => ripple.remove();
        }
        document.addEventListener('pointerdown', e => createRipple(e.clientX, e.clientY));

        // ========== 原有跳转按钮 ==========
        document.getElementById('enterBtn').addEventListener('click', e => {
            e.stopPropagation();
            window.location.href = 'video.html';
        });

        window.addEventListener('beforeunload', () => cancelAnimationFrame(animId));

        // ========== 新增：抽屉 + 雪花分裂 ==========
        const drawerBtn = document.getElementById('drawerBtn');
        const drawer = document.getElementById('drawer');
        const drawerOptions = document.querySelectorAll('.drawer-option');
        let isDrawerOpen = false;
        let isShattering = false;

        // 切换抽屉弹出/收回
        drawerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isShattering) return;
            
            isDrawerOpen = !isDrawerOpen;
            drawer.classList.toggle('active', isDrawerOpen);
        });

        // 选项点击：雪花分裂消失
        drawerOptions.forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isShattering) return;
                isShattering = true;
                
                // 执行分裂动画
                shatterElement(option, () => {
                    // 分裂完成后关闭抽屉
                    isDrawerOpen = false;
                    drawer.classList.remove('active');
                    // 重置选项状态，下次打开可正常显示
                    setTimeout(() => {
                        option.style.opacity = '1';
                        isShattering = false;
                    }, 500);
                });

                // 可在此处添加选择后的业务逻辑
                // console.log('选择了:', option.dataset.value);
            });
        });

        // 元素碎裂成雪花碎片核心函数
        function shatterElement(element, callback) {
            const rect = element.getBoundingClientRect();
            const fragmentCount = 24; // 碎片数量，数值越大越细碎
            const fragments = [];
            
            // 隐藏原选项
            element.style.opacity = '0';
            
            // 批量生成碎片
            for (let i = 0; i < fragmentCount; i++) {
                const frag = document.createElement('div');
                frag.className = 'fragment';
                
                // 随机碎片大小
                const size = Math.random() * 8 + 4;
                frag.style.width = `${size}px`;
                frag.style.height = `${size}px`;
                
                // 初始位置限定在原选项范围内
                const left = rect.left + Math.random() * rect.width;
                const top = rect.top + Math.random() * rect.height;
                frag.style.left = `${left}px`;
                frag.style.top = `${top}px`;
                
                // 随机飘落参数：水平散开 + 向下坠落 + 旋转
                const tx = (Math.random() - 0.5) * 150;
                const ty = Math.random() * 120 + 60;
                const rot = (Math.random() - 0.5) * 720;
                
                frag.style.setProperty('--tx', `${tx}px`);
                frag.style.setProperty('--ty', `${ty}px`);
                frag.style.setProperty('--rot', `${rot}deg`);
                
                // 随机动画时长与延迟，模拟雪花错落飘落
                const duration = Math.random() * 0.6 + 0.6;
                frag.style.animation = `fragmentFall ${duration}s ease-out forwards`;
                frag.style.animationDelay = `${Math.random() * 0.1}s`;
                
                document.body.appendChild(frag);
                fragments.push(frag);
            }
            
            // 动画结束清理所有碎片
            setTimeout(() => {
                fragments.forEach(f => f.remove());
                if (callback) callback();
            }, 1300);
        }

        // 点击抽屉外区域自动收回
        document.addEventListener('click', (e) => {
            if (!isDrawerOpen || isShattering) return;
            if (!drawer.contains(e.target) && e.target !== drawerBtn) {
                isDrawerOpen = false;
                drawer.classList.remove('active');
            }
        });
    </script>
</body>
</html>
