<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
        }

        /* emoji 背景场 */
        .emoji-field {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .emoji-item {
            position: absolute;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            opacity: 0.8;
            will-change: transform;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-25px) rotate(8deg);
            }
            100% {
                transform: translateY(0) rotate(0deg);
            }
        }

        /* 点击波纹效果 */
        .ripple {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0.9;
            pointer-events: none;
            animation: ripple-expand 1s ease-out forwards;
            z-index: 3;
        }

        @keyframes ripple-expand {
            to {
                transform: translate(-50%, -50%) scale(5);
                opacity: 0;
            }
        }

        /* 中央按钮 */
        .center-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .enter-btn {
            padding: 22px 70px;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            border-radius: 999px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3),
                        inset 0 0 25px rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5),
                        inset 0 0 30px rgba(0, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .enter-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="emoji-field" id="emojiField"></div>
    <div class="center-wrap">
        <button class="enter-btn" id="enterBtn">ENTER</button>
    </div>

    <script>
        // 随机 emoji 列表
        const emojiList = ['✨','🚀','💫','🌟','⚡','🌈','🎮','🎧','💻','🌌','🔮','💎','🎆','👾','🛸','🌀','💥','🎇'];
        const emojiCount = 70;
        const field = document.getElementById('emojiField');
        const emojiElements = [];

        // 生成随机 emoji
        for (let i = 0; i < emojiCount; i++) {
            const item = document.createElement('div');
            item.className = 'emoji-item';
            item.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
            
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const size = Math.random() * 30 + 20; // 20-50px
            const delay = Math.random() * 6;
            const duration = Math.random() * 4 + 5; // 5-9s

            item.style.left = `${left}%`;
            item.style.top = `${top}%`;
            item.style.fontSize = `${size}px`;
            item.style.animationDelay = `${delay}s`;
            item.style.animationDuration = `${duration}s`;
            
            // 存储基础位置用于波动计算
            item.dataset.baseX = left;
            item.dataset.baseY = top;
            item.dataset.offsetPhase = Math.random() * Math.PI * 2; // 随机相位，错落波动
            
            field.appendChild(item);
            emojiElements.push(item);
        }

        // ========== 全局鼠标波动效果 ==========
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        const waveRadius = 250; // 波动影响半径
        const waveAmplitude = 20; // 波动最大偏移像素

        // 更新鼠标位置
        function updateMouse(x, y) {
            mouseX = x;
            mouseY = y;
        }

        document.addEventListener('mousemove', (e) => {
            updateMouse(e.clientX, e.clientY);
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                updateMouse(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        // 波动动画循环
        function animateWave() {
            emojiElements.forEach((el, index) => {
                const rect = el.getBoundingClientRect();
                const elCenterX = rect.left + rect.width / 2;
                const elCenterY = rect.top + rect.height / 2;

                // 计算元素与鼠标的距离
                const dx = elCenterX - mouseX;
                const dy = elCenterY - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 距离越近偏移越大，正弦波平滑过渡
                if (distance < waveRadius) {
                    const ratio = 1 - distance / waveRadius;
                    const wave = Math.sin(ratio * Math.PI) * waveAmplitude * ratio;
                    
                    // 沿鼠标反方向偏移，模拟水波推开效果
                    const offsetX = (dx / distance) * wave || 0;
                    const offsetY = (dy / distance) * wave || 0;

                    el.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                } else {
                    el.style.transform = '';
                }
            });

            requestAnimationFrame(animateWave);
        }

        animateWave();

        // ========== 点击波纹效果 ==========
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            document.body.appendChild(ripple);
            
            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
        }

        document.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        document.addEventListener('touchstart', (e) => {
            for (let touch of e.touches) {
                createRipple(touch.clientX, touch.clientY);
            }
        }, { passive: true });

        // 跳转按钮
        document.getElementById('enterBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = 'video.html';
        });
    </script>
</body>
</html>
