<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
        }

        /* 背景动态光晕 */
        .glow-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: glowMove 18s ease-in-out infinite alternate;
            will-change: transform;
        }

        .glow-1 {
            background: radial-gradient(circle, #ff00ff, transparent 70%);
            top: -300px;
            left: -200px;
        }

        .glow-2 {
            background: radial-gradient(circle, #00ffff, transparent 70%);
            bottom: -300px;
            right: -200px;
            animation-delay: -9s;
        }

        @keyframes glowMove {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(120px, 100px) scale(1.3);
            }
        }

        /* 两侧表情栏 */
        .sidebar {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            z-index: 5;
        }

        .sidebar.left {
            left: 0;
        }

        .sidebar.right {
            right: 0;
        }

        .side-emoji {
            font-size: 42px;
            animation: bounce 2.2s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-18px) scale(1.15);
            }
        }

        /* 视频容器 */
        .video-wrap {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 82vw;
            max-height: 82vh;
            z-index: 10;
        }

        video {
            width: 100%;
            height: auto;
            max-height: 82vh;
            border-radius: 14px;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.2);
            outline: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .side-emoji {
                font-size: 30px;
            }
            .video-wrap {
                max-width: 75vw;
            }
        }
    </style>
</head>
<body>
    <div class="glow-bg">
        <div class="glow glow-1" id="glow1"></div>
        <div class="glow glow-2" id="glow2"></div>
    </div>

    <!-- 左侧表情栏 -->
    <div class="sidebar left" id="leftBar"></div>
    <!-- 右侧表情栏 -->
    <div class="sidebar right" id="rightBar"></div>

    <!-- 视频区域 -->
    <div class="video-wrap">
        <video src="video.mp4" controls preload="metadata"></video>
    </div>

    <script>
        const sideEmojis = ['✨','💫','🌟','⚡','🔮','💎','🎆','👾','🌀'];
        const leftBar = document.getElementById('leftBar');
        const rightBar = document.getElementById('rightBar');
        const allSideEmojis = [];

        // 生成两侧表情
        function fillBar(container, reverse = false) {
            const list = reverse ? [...sideEmojis].reverse() : sideEmojis;
            list.forEach((emoji, index) => {
                const item = document.createElement('div');
                item.className = 'side-emoji';
                item.textContent = emoji;
                item.style.animationDelay = `${index * 0.2}s`;
                container.appendChild(item);
                allSideEmojis.push(item);
            });
        }

        fillBar(leftBar);
        fillBar(rightBar, true);

        // ========== 全局鼠标波动效果 ==========
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        const waveRadius = 300;
        const waveAmplitude = 15;
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');

        function updateMouse(x, y) {
            mouseX = x;
            mouseY = y;
        }

        document.addEventListener('mousemove', (e) => {
            updateMouse(e.clientX, e.clientY);
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                updateMouse(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        function animateWave() {
            // 侧边表情波动
            allSideEmojis.forEach((el) => {
                const rect = el.getBoundingClientRect();
                const elCenterX = rect.left + rect.width / 2;
                const elCenterY = rect.top + rect.height / 2;

                const dx = elCenterX - mouseX;
                const dy = elCenterY - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < waveRadius) {
                    const ratio = 1 - distance / waveRadius;
                    const wave = Math.sin(ratio * Math.PI) * waveAmplitude * ratio;
                    const offsetX = (dx / distance) * wave || 0;
                    const offsetY = (dy / distance) * wave || 0;

                    // 叠加原有跳动动画的基础上增加偏移
                    el.style.marginLeft = `${offsetX}px`;
                    el.style.marginTop = `${offsetY}px`;
                } else {
                    el.style.marginLeft = '';
                    el.style.marginTop = '';
                }
            });

            // 背景光晕随鼠标轻微偏移
            const glowOffsetX = (mouseX - window.innerWidth / 2) * 0.03;
            const glowOffsetY = (mouseY - window.innerHeight / 2) * 0.03;
            glow1.style.transform = `translate(${glowOffsetX}px, ${glowOffsetY}px)`;
            glow2.style.transform = `translate(${-glowOffsetX}px, ${-glowOffsetY}px)`;

            requestAnimationFrame(animateWave);
        }

        animateWave();
    </script>
</body>
</html>
