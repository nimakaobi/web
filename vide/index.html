<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>点击计数器</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    #count {
      font-size: 48px;
      margin-bottom: 30px;
    }

    #btn {
      font-size: 28px;
      padding: 30px 60px;
      border: none;
      border-radius: 20px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.1s ease;
    }

    #btn:active {
      transform: scale(0.95);
    }

    #reset {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #ff4d4f;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>点击计数器</h1>
  <div id="count">0</div>

  <button id="btn">点我 +1</button>
  <button id="reset">清零</button>

  <script>
    // 读取本地数据
    let count = localStorage.getItem("clickCount");
    count = count ? parseInt(count) : 0;

    const countEl = document.getElementById("count");
    const btn = document.getElementById("btn");
    const reset = document.getElementById("reset");

    // 初始化显示
    countEl.innerText = count;

    // 点击增加
    btn.addEventListener("click", () => {
      count++;
      countEl.innerText = count;
      localStorage.setItem("clickCount", count);
    });

    // 清零
    reset.addEventListener("click", () => {
      count = 0;
      countEl.innerText = count;
      localStorage.setItem("clickCount", count);
    });
  </script>

</body>
</html>
